<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CTGents 监控</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#e6edf3;
    --muted:#8b949e; --accent:#58a6ff; --ok:#3fb950; --warn:#d29922; --bad:#f85149;
    --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font-family:-apple-system,'Segoe UI',Roboto,'Microsoft YaHei',sans-serif; }
  header { display:flex; align-items:center; gap:16px; padding:14px 22px;
           border-bottom:1px solid var(--border); background:var(--panel); position:sticky; top:0; z-index:5; }
  header h1 { font-size:16px; margin:0; font-weight:600; letter-spacing:.5px; }
  header .meta { color:var(--muted); font-size:12px; font-family:var(--mono); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--ok); display:inline-block; }
  .dot.stale { background:var(--warn); }
  main { display:grid; grid-template-columns:repeat(12,1fr); gap:14px; padding:18px; max-width:1400px; margin:0 auto; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:14px 16px; overflow:hidden; }
  .panel h2 { font-size:12px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted);
              margin:0 0 12px; font-weight:600; }
  .col-12{grid-column:span 12} .col-8{grid-column:span 8} .col-6{grid-column:span 6}
  .col-4{grid-column:span 4} .col-3{grid-column:span 3}
  @media(max-width:900px){ .col-8,.col-6,.col-4,.col-3{grid-column:span 12} }
  .stat { display:flex; flex-direction:column; gap:4px; }
  .stat .num { font-size:30px; font-weight:700; font-family:var(--mono); line-height:1; }
  .stat .lbl { font-size:11px; color:var(--muted); }
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:14px; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th,td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--border); vertical-align:top; }
  th { color:var(--muted); font-weight:500; font-size:11px; }
  td.mono,.mono { font-family:var(--mono); }
  .sha { color:var(--accent); }
  .pill { display:inline-block; padding:1px 7px; border-radius:10px; font-size:10px; font-family:var(--mono); }
  .pill.ok{ background:rgba(63,185,80,.15); color:var(--ok); }
  .pill.warn{ background:rgba(210,153,34,.15); color:var(--warn); }
  .pill.bad{ background:rgba(248,81,73,.15); color:var(--bad); }
  .pill.dim{ background:rgba(139,148,158,.15); color:var(--muted); }
  pre { white-space:pre-wrap; word-break:break-word; font-family:var(--mono); font-size:12px;
        color:var(--fg); margin:0; max-height:260px; overflow:auto; }
  .muted{ color:var(--muted); } .empty{ color:var(--muted); font-size:12px; font-style:italic; }
  .bar { height:6px; border-radius:3px; background:var(--border); overflow:hidden; margin-top:4px; }
  .bar > span { display:block; height:100%; background:var(--ok); }
  .err { color:var(--bad); font-size:12px; font-family:var(--mono); }
</style>
</head>
<body>
<header>
  <h1>CTGents 监控</h1>
  <span class="meta" id="branch">—</span>
  <span style="flex:1"></span>
  <span class="dot" id="dot"></span>
  <span class="meta" id="updated">连接中…</span>
</header>
<main id="root"></main>

<script>
const $ = (h)=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstChild;};
const esc = (s)=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const pct = (r)=>(r*100).toFixed(1)+'%';
const rateClass = (r)=> r>=0.9?'ok' : r>=0.7?'warn' : 'bad';

function errBlock(d){ return d && d._error ? `<div class="err">⚠ ${esc(d._error)}</div>` : ''; }

function render(s){
  document.getElementById('branch').textContent = (s.git&&s.git.branch)? '⎇ '+s.git.branch : '';
  const root = document.getElementById('root');
  root.innerHTML = '';

  // ── 顶部指标卡：可信 + 命中率 ──
  const perf = s.performance||{}, trust = s.trust||{};
  const hr = perf.overall_hit_rate||0;
  root.appendChild($(`<section class="panel col-12">
    <div class="stats-row">
      <div class="stat"><div class="num" style="color:var(--${rateClass(hr)})">${pct(hr)}</div>
        <div class="lbl">前缀缓存命中率（近 ${ (perf.sessions||[]).length } 会话）</div>
        <div class="bar"><span style="width:${(hr*100).toFixed(0)}%;background:var(--${rateClass(hr)})"></span></div></div>
      <div class="stat"><div class="num">${perf.total_requests??'—'}</div><div class="lbl">总请求数</div></div>
      <div class="stat"><div class="num"><span class="pill ${trust.ok?'ok':'bad'}">${trust.ok?'PASS':'ALERT'}</span></div>
        <div class="lbl">门通行证审计</div></div>
      <div class="stat"><div class="num">${(s.memory&&s.memory.lessons?s.memory.lessons.length:'—')}</div><div class="lbl">记忆条数</div></div>
      <div class="stat"><div class="num">${(s.gaps&&s.gaps.gaps?s.gaps.gaps.length:0)}</div><div class="lbl">待办改进方向</div></div>
    </div>
    ${ trust.ok===false ? `<pre style="margin-top:10px;color:var(--bad)">${esc(trust.gate)}</pre>`:'' }
    ${errBlock(trust)}${errBlock(perf)}
  </section>`));

  // ── 进化时间线 ──
  const git = s.git||{};
  const rows = (git.commits||[]).map(c=>`<tr>
     <td class="mono sha">${esc(c.sha)}</td>
     <td class="mono muted">${esc((c.date||'').slice(0,16).replace('T',' '))}</td>
     <td>${esc(c.subject)}</td></tr>`).join('');
  root.appendChild($(`<section class="panel col-8"><h2>进化时间线</h2>
     ${errBlock(git)}<table><thead><tr><th>commit</th><th>时间</th><th>说明</th></tr></thead>
     <tbody>${rows||'<tr><td colspan=3 class="empty">无提交</td></tr>'}</tbody></table></section>`));

  // ── 性能：各会话命中率 ──
  const sess = (perf.sessions||[]).map(x=>`<tr>
     <td class="mono">${esc(x.session)}</td>
     <td class="mono">${x.requests}</td>
     <td class="mono"><span class="pill ${rateClass(x.hit_rate)}">${pct(x.hit_rate)}</span></td></tr>`).join('');
  root.appendChild($(`<section class="panel col-4"><h2>各会话命中率</h2>
     <table><thead><tr><th>会话</th><th>请求</th><th>命中</th></tr></thead>
     <tbody>${sess||'<tr><td colspan=3 class="empty">无数据</td></tr>'}</tbody></table></section>`));

  // ── 记忆 & 野心 ──
  const mem = s.memory||{};
  const les = (mem.lessons||[]).map(l=>`<tr>
     <td class="mono">${esc(l.name)}</td>
     <td>${l.type?`<span class="pill dim">${esc(l.type)}</span>`:''}</td>
     <td class="mono">${l.fingerprint?esc(l.fingerprint):'<span class="muted">—</span>'}</td>
     <td class="mono">${l.times!==''?esc(l.times):'<span class="muted">—</span>'}</td></tr>`).join('');
  root.appendChild($(`<section class="panel col-6"><h2>记忆（lessons）</h2>
     ${errBlock(mem)}<table><thead><tr><th>name</th><th>类型</th><th>指纹</th><th>遭遇</th></tr></thead>
     <tbody>${les||'<tr><td colspan=4 class="empty">空</td></tr>'}</tbody></table>
     <h2 style="margin-top:14px">野心（ambitions）</h2>
     ${ mem.ambitions ? `<pre>${esc(mem.ambitions)}</pre>` : '<div class="empty">暂无野心</div>' }
     </section>`));

  // ── 改进方向 & 任务 ──
  const gaps = s.gaps||{}, tasks = s.tasks||{};
  const gl = (gaps.gaps||[]).map(g=>`<tr>
     <td><span class="pill ${g.severity==='high'||g.severity==='crit'?'bad':'warn'}">${esc(g.severity)}</span></td>
     <td class="mono muted">${esc(g.source)}</td>
     <td>${esc(g.detail)}</td></tr>`).join('');
  const taskBody = tasks.current
     ? `<pre>${esc(tasks.current)}</pre>`
     : '<div class="empty">无进行中任务</div>';
  root.appendChild($(`<section class="panel col-6"><h2>改进方向（gaps）${gaps.available===false?'<span class="muted" style="text-transform:none"> · 等 agent 下次启动计算</span>':''}</h2>
     ${errBlock(gaps)}<table><tbody>${gl||'<tr><td class="empty">无</td></tr>'}</tbody></table>
     <h2 style="margin-top:14px">当前任务 ${tasks.progress?`<span class="mono muted" style="text-transform:none">${esc(tasks.progress)}</span>`:''}</h2>
     ${errBlock(tasks)}${taskBody}</section>`));
}

let lastOk = 0;
async function tick(){
  try{
    const r = await fetch('/api/state',{cache:'no-store'});
    const s = await r.json();
    render(s);
    lastOk = Date.now();
    document.getElementById('dot').classList.remove('stale');
    document.getElementById('updated').textContent =
      '更新于 ' + new Date(s.generated_at).toLocaleTimeString();
  }catch(e){
    document.getElementById('dot').classList.add('stale');
    document.getElementById('updated').textContent = '读取失败，重试中…';
  }
}
tick();
setInterval(tick, 5000);
</script>
</body>
</html>
