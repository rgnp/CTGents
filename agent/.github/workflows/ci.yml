# GitHub Actions CI
# 每次 push / PR 到 master 时自动运行：ruff 检查 + pytest + 项目规范扫描

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint & Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: pytest -v --tb=short
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || 'sk-placeholder' }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY || 'tvly-placeholder' }}

  spec-check:
    name: Project Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run check_project
        run: |
          pip install pytest
          python -c "
          from src.tools.lint import check_project;
          result = check_project();
          print(result);
          # 如果总分低于 80 则报错退出
          score_line = [l for l in result.split('\n') if '总分' in l][0]
          score = int(score_line.split(':')[1].split('/')[0].strip())
          print(f'\n解析得分: {score}/100')
          if score < 80:
              raise SystemExit(1)
          "
